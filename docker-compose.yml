services:
  postgres:
    image: postgres:16-alpine
    container_name: alrwad-postgres
    environment:
      POSTGRES_DB: alrwad
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - alrwad_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alrwad"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  alrwad_postgres_data:
